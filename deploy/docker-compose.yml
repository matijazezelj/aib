services:
  aib:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${AIB_PORT:-8080}:8080"
    volumes:
      - aib-data:/data
    environment:
      - AIB_STORAGE_PATH=/data/aib.db
      - AIB_STORAGE_MEMGRAPH_ENABLED=true
      - AIB_STORAGE_MEMGRAPH_URI=bolt://memgraph:7687
    depends_on:
      memgraph:
        condition: service_healthy
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-mage:latest
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${MEMGRAPH_BOLT_PORT:-7687}:7687"
      - "${BIND_ADDR:-127.0.0.1}:${MEMGRAPH_HTTP_PORT:-7444}:7444"
    volumes:
      - memgraph-data:/var/lib/memgraph
    environment:
      - MEMGRAPH_TELEMETRY_ENABLED=false
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/7687"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  aib-data:
  memgraph-data:
